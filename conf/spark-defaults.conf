# =============================================================================
# Apache Spark Default Configuration — Proyecto Tesis ETL
# =============================================================================
# Este archivo es leído automáticamente por spark-submit.
# Sobreescribe valores por defecto de Spark. No modificar sin revisión.
#
# Infraestructura:
#   - 1 master + 1 worker en Docker, 2G RAM cada uno
#   - Red compartida tesis-net (SQL Server + Airflow)
#   - Spark 4.0.3, Kryo serializer, autenticación con secreto compartido
#   - ETL: CSV → transformaciones → Parquet/CSV (JDBC a SQL Server comentado)
# =============================================================================


# =============================================================================
# 1. MASTER / CLUSTER
# =============================================================================
spark.master                       spark://spark-master:7077


# =============================================================================
# 2. WORKER RESOURCES — límites físicos del worker
# =============================================================================
# Sin estas propiedades Spark asume recursos infinitos y planifica mal.
# spark.worker.memory: 1.5g de 2G totales del container (margen para SO/buffers)
# spark.worker.cores: 1 core (coincide con el límite del contenedor)
# spark.cores.max: 1 (evita que Spark intente usar más cores de los disponibles)
spark.worker.memory                1.5g
spark.worker.cores                 1
spark.cores.max                    1


# =============================================================================
# 3. MEMORIA — DRIVER Y EXECUTOR
# =============================================================================
# Driver: coordina el pipeline (512m suficiente para ETLs chicos).
# Executor: procesa datos (512m heap + 512m overhead = ~1G total).
# Fórmula: executor.memory + overhead + SO < 2G (límite del container).
spark.driver.memory                512m
spark.driver.memoryOverhead        256m
spark.executor.memory              512m
spark.executor.memoryOverhead      512m

# Cores
spark.driver.cores                 1
spark.executor.cores               1
spark.executor.instances           1


# =============================================================================
# 4. DINAMIC ALLOCATION — deshabilitado (1 executor fijo por ETL)
# =============================================================================
# Cuando haya múltiples ETLs simultáneos, habilitar con:
#   minExecutors = 1, maxExecutors = spark.cores.max
spark.dynamicAllocation.enabled              false


# =============================================================================
# 5. SERIALIZACIÓN — Kryo (más rápido que Java en ETL)
# =============================================================================
spark.serializer                            org.apache.spark.serializer.KryoSerializer
spark.kryoserializer.buffer.max             64m
spark.kryo.registrationRequired             false
spark.kryo.referenceTracking                true


# =============================================================================
# 6. SHUFFLE — optimizado para clúster chico (1 worker, datos pequeños)
# =============================================================================
spark.sql.shuffle.partitions        4
spark.shuffle.compress              true
spark.shuffle.spill.compress        true
spark.shuffle.file.buffer           64k
spark.reducer.maxSizeInFlight       96m
spark.shuffle.sort.bypassMergeThreshold 200


# =============================================================================
# 7. SQL / AQE (Adaptive Query Execution)
# =============================================================================
spark.sql.adaptive.enabled                     true
spark.sql.adaptive.coalescePartitions.enabled   true
spark.sql.adaptive.advisoryPartitionSizeInBytes 32m
spark.sql.adaptive.skewJoin.enabled             true
spark.sql.autoBroadcastJoinThreshold            10MB


# =============================================================================
# 8. LECTURA CSV (input del ETL)
# =============================================================================
spark.sql.files.maxPartitionBytes     64m
spark.sql.files.openCostInBytes       4m
spark.sql.legacy.timeParserPolicy     LEGACY


# =============================================================================
# 9. ESCRITURA PARQUET (output del ETL)
# =============================================================================
spark.sql.parquet.compression.codec    snappy
spark.sql.parquet.filterPushdown       true
spark.sql.parquet.mergeSchema          false


# =============================================================================
# 10. JDBC / SQL SERVER (cuando se descomente load.py)
# =============================================================================
spark.sql.broadcastTimeout             600s
spark.network.timeout                  600s
spark.sql.execution.arrow.maxRecordsPerBatch 10000


# =============================================================================
# 11. TOLERANCIA A FALLOS
# =============================================================================
spark.task.maxFailures                 4
spark.speculation                      true
spark.speculation.multiplier           1.5
spark.speculation.quantile             0.75


# =============================================================================
# 12. SEGURIDAD
# =============================================================================
# Autenticación con secreto compartido (SPARK_AUTH_SECRET en .env)
spark.authenticate                     true
spark.authenticate.secret              ${SPARK_AUTH_SECRET}
spark.network.crypto.enabled           true
spark.ssl.enabled                      false
# NOTA: SSL deshabilitado. Ver issue #3 del análisis de vulnerabilidades.


# =============================================================================
# 13. EVENTOS / LOGGING / MONITOREO
# =============================================================================
spark.eventLog.enabled                 true
spark.eventLog.dir                     /opt/spark/logs/events
spark.history.fs.logDirectory          /opt/spark/logs/history
spark.ui.port                          8080
spark.ui.showConsoleProgress           true


# =============================================================================
# 14. SISTEMA DE ARCHIVOS
# =============================================================================
spark.hadoop.fs.permissions.umask-mode 022
