version: 1

formatters:
  simple:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout

  file:
    class: logging.FileHandler
    level: INFO
    formatter: simple
    filename: /opt/spark/projects/proyecto_001/logs/etl.log

loggers:
  etl.main:
    level: INFO
    handlers: [console, file]
    propagate: no

  etl.extract:
    level: INFO
    handlers: [console, file]
    propagate: no

  etl.transform:
    level: DEBUG
    handlers: [console, file]
    propagate: no

  etl.load:
    level: INFO
    handlers: [console, file]
    propagate: no

root:
  level: WARNING
  handlers: [console, file]

