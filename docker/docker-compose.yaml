# ======================
# APACHE SPARK SERVICE
# ======================
services:
  spark-master:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: apache_spark:01
    container_name: spark-master
    restart: unless-stopped
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8081:8080"
    networks:
      - tesis-net
    user: "1000:1000"
    volumes:
      - ../shared:/opt/spark/shared
      - ../spark-projects:/opt/spark/spark-projects
      - ../extra-jars:/opt/spark/extra-jars
      - ../logs:/opt/spark/logs
      #- ../logs:/opt/spark/logs
      #- ../data:/opt/spark/data
    env_file:
      - ../conf/env/.env.prod
    environment:
      SPARK_MASTER_HOST: ${PROD_SPARK_MASTER_HOST:-spark-master}
      SPARK_MASTER_CORES: ${PROD_SPARK_MASTER_CORES:-2}
      SPARK_MASTER_MEMORY: ${PROD_SPARK_MASTER_MEMORY:-2g}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
          

  spark-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: apache_spark:01
    container_name: spark-worker
    restart: unless-stopped
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    networks:
      - tesis-net
    user: "1000:1000"
    volumes:
      - ../shared:/opt/spark/shared
      - ../spark-projects:/opt/spark/spark-projects
      - ../extra-jars:/opt/spark/extra-jars
      - ../logs:/opt/spark/logs
    env_file:
      - ../conf/env/.env.prod
    environment:
      SPARK_MASTER_HOST: ${PROD_SPARK_MASTER_HOST:-spark-master}
      SPARK_WORKER_CORES: ${PROD_SPARK_WORKER_CORES:-2}
      SPARK_WORKER_MEMORY: ${PROD_SPARK_WORKER_MEMORY:-2g}
    healthcheck:
      test: ["CMD", "bash", "-c", "pgrep -f 'org.apache.spark.deploy.worker.Worker' >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

networks:
  tesis-net:
    name: tesis-net
    external: true
